<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCG Command Center</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --card: #fffdf8;
      --border: #d6cdbf;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #9a7228;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }
    .wrap { max-width: 1200px; margin: 0 auto; }
    .header {
      display: flex; justify-content: space-between; align-items: end;
      margin-bottom: 18px; border-bottom: 1px solid var(--border); padding-bottom: 12px;
    }
    h1 { margin: 0; font-size: 28px; letter-spacing: -0.4px; }
    .subtitle { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1.2px; margin-top: 4px; }
    .sync { font-size: 12px; color: var(--muted); }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      min-height: 420px;
    }
    .card h2 { margin: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1.3px; color: var(--muted); }
    .big {
      margin-top: 8px;
      font-size: 40px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .meta { margin-top: 8px; font-size: 13px; color: var(--muted); }

    table { width: 100%; border-collapse: collapse; margin-top: 14px; }
    th, td { text-align: left; font-size: 13px; padding: 8px 6px; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .pill {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      background: #eee8dc; border: 1px solid var(--border); font-size: 11px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .card { min-height: unset; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1>SCG Command Center</h1>
        <div class="subtitle">Only what matters</div>
      </div>
      <div class="sync" id="syncText">Sync: loading...</div>
    </div>

    <div class="grid">
      <section class="card">
        <h2>Cars on Road</h2>
        <div class="big" id="carsCount">0</div>
        <div class="meta" id="carsMeta">Live deals and current payment state</div>
        <table>
          <thead>
            <tr>
              <th>Car</th>
              <th>Status</th>
              <th>Next Due</th>
            </tr>
          </thead>
          <tbody id="carsRows">
            <tr><td colspan="3">Loading...</td></tr>
          </tbody>
        </table>
      </section>

      <section class="card">
        <h2>Inventory</h2>
        <div class="big" id="inventoryCount">0</div>
        <div class="meta" id="inventoryMeta">Ready-to-go vehicles</div>
        <table>
          <thead>
            <tr>
              <th>Car</th>
              <th>Term</th>
              <th>Monthly</th>
            </tr>
          </thead>
          <tbody id="inventoryRows">
            <tr><td colspan="3">Loading...</td></tr>
          </tbody>
        </table>
      </section>
    </div>
  </div>

  <script>
    const money = (n) => `$${Number(n || 0).toLocaleString()}`;

    async function load() {
      const [liveRes, dealsRes] = await Promise.all([
        fetch('./data/live.json?ts=' + Date.now(), { cache: 'no-store' }),
        fetch('./data/deals-kanban.json?ts=' + Date.now(), { cache: 'no-store' }),
      ]);

      const live = liveRes.ok ? await liveRes.json() : {};
      const deals = dealsRes.ok ? await dealsRes.json() : { deals: [] };
      const allDeals = Array.isArray(deals.deals) ? deals.deals : [];

      const onRoad = allDeals.filter(d => (d.status || '').toLowerCase() !== 'closeout');
      const inventoryRows = allDeals.filter(d => (d.status || '').toLowerCase() === 'live');

      document.getElementById('syncText').textContent = `Sync: ${live.syncedAtEt || deals.syncedAtEt || 'updated'}`;
      document.getElementById('carsCount').textContent = String(live?.kpis?.carsOnRoad ?? onRoad.length ?? 0);
      document.getElementById('inventoryCount').textContent = String(live?.inventory?.count ?? inventoryRows.length ?? 0);

      document.getElementById('carsMeta').textContent = `${onRoad.length} tracked deals`;
      document.getElementById('inventoryMeta').textContent = `${inventoryRows.length} live inventory records`;

      document.getElementById('carsRows').innerHTML = onRoad
        .slice(0, 16)
        .map(d => `
          <tr>
            <td>${d.car || '—'}</td>
            <td><span class="pill">${d.status || '—'}</span></td>
            <td>${d.nextMonthly || '—'}</td>
          </tr>
        `)
        .join('') || '<tr><td colspan="3">No cars on road found.</td></tr>';

      document.getElementById('inventoryRows').innerHTML = inventoryRows
        .slice(0, 16)
        .map(d => `
          <tr>
            <td>${d.car || '—'}</td>
            <td>${d.term || '—'}</td>
            <td>${d.closedMonthly ? money(d.closedMonthly) : '—'}</td>
          </tr>
        `)
        .join('') || '<tr><td colspan="3">No inventory found.</td></tr>';
    }

    load().catch(() => {
      document.getElementById('syncText').textContent = 'Sync: failed';
    });
  </script>
</body>
</html>
